; PlatformIO Project Configuration File
;
; HK Bus Stop ETA Monitor — Waveshare ESP32-S3-Touch-LCD-4.3 (all-in-one)
; See PIN_ASSIGNMENT.md? — superseded; the on-board LCD is wired by the board itself.
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-touch-lcd-4_3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
board = esp32-s3-devkitc1-n16r8

board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.filesystem = littlefs

lib_archive = no
monitor_speed = 115200

lib_deps =
    https://github.com/esp-arduino-libs/ESP32_Display_Panel.git
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git
    esp-arduino-libs/esp-lib-utils@^0.3.0
    lvgl/lvgl@^8.4.0
    bblanchon/ArduinoJson @ ^7.2.0

build_flags =
    -std=gnu++17
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D LV_CONF_INCLUDE_SIMPLE
    -D CORE_DEBUG_LEVEL=3
    ; Triple-buffer + full-refresh — eliminates flicker during bursty
    ; label updates (e.g. Update_Bus_List sets 16 labels at once) and
    ; while the Arduino loop holds the LVGL mutex during HTTP fetches.
    -D CONFIG_LVGL_PORT_AVOID_TEARING_MODE=2
    -Iinclude

build_src_filter =
    +<*>
